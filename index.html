<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Rinka Shop Calculator</title>

<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png">
<link rel="apple-touch-icon" href="/assets/android-chrome-192x192.png">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🌸 Rinka shop Calculator</h1>

  <button id="themeToggle">
    🌙
  </button>
</header>

<main>

<section class="card">

<label>ชื่อสินค้า</label>
<input id="productName" type="text" placeholder="เช่น Wuthering Waves Standee">

<label>ราคาสินค้า (หยวน)</label>
<input id="yuanPrice" type="number" step="0.01">

<label>เรทหยวน</label>
<input id="rate" type="number" step="0.01">

<label>จำนวน</label>
<input id="qty" type="number" value="1">

<div class="row">
  <input type="checkbox" id="hasDiscount">
  <span>มีส่วนลด</span>
</div>

<div id="discountBox" class="hidden">
  <label>ส่วนลด (หยวน)</label>
  <input id="discount" type="number" step="0.01">
</div>

<label>ค่าธรรมเนียม (%)</label>
<input id="feePercent" type="number" value="2">

<label>ประเภทสินค้า</label>

<select id="productType">

<option value="">
เลือกประเภทสินค้า
</option>

<option value="card">
การ์ด
</option>

<option value="keychain">
พวงกุญแจ
</option>

<option value="standee">
สแตนดี้
</option>

<option value="plush">
ตุ๊กตา
</option>

</select>

<label>ค่านำเข้าต่อชิ้น (บาท)</label>
<input id="shipping" type="number" value="20">

<label>กำไรต่อชิ้น (บาท)</label>
<input id="profitPerPiece" type="number" value="20">

<label>ปัดเศษ</label>
<select id="roundType">
  <option value="0">ไม่ปัด</option>
  <option value="1">บาทถ้วน</option>
  <option value="5">5 บาท</option>
  <option value="10">10 บาท</option>
  <option value="50">50 บาท</option>
</select>

<button id="calculateBtn">
คำนวณ
</button>

</section>

<section class="card result">

<div class="price-box">

<div class="price-label">
💰 ราคาขาย
</div>

<div id="finalPrice" class="price">
0 บาท
</div>

</div>

<button id="copyPrice">
📋 Copy ราคา
</button>

<button id="copyPost">
📋 Copy โพสต์
</button>

<details>

<summary>
ดูรายละเอียด
</summary>

<div id="detailOutput"></div>

</details>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
